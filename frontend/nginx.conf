server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Serve .mjs files with correct JavaScript MIME type (needed for PDF.js worker)
    location ~* \.mjs$ {
        types { application/javascript mjs; }
        try_files $uri =404;
    }
}
