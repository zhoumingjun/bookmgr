syntax = "proto3";

package bookmgr.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/api/httpbody.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";
import "bookmgr/v1/common.proto";

option go_package = "github.com/zhoumingjun/bookmgr/gen/api/bookmgr/v1;bookmgrv1";

// BookService manages book resources.
service BookService {
  // ListBooks returns a paginated list of books.
  rpc ListBooks(ListBooksRequest) returns (ListBooksResponse) {
    option (google.api.http) = {
      get: "/api/v1/books"
    };
  }

  // GetBook returns a single book by ID.
  rpc GetBook(GetBookRequest) returns (GetBookResponse) {
    option (google.api.http) = {
      get: "/api/v1/books/{id}"
    };
  }

  // CreateBook creates a new book record. Admin/super_admin only.
  rpc CreateBook(CreateBookRequest) returns (CreateBookResponse) {
    option (google.api.http) = {
      post: "/api/v1/books"
      body: "*"
    };
  }

  // UpdateBook updates an existing book's metadata. Admin/super_admin only.
  rpc UpdateBook(UpdateBookRequest) returns (UpdateBookResponse) {
    option (google.api.http) = {
      patch: "/api/v1/books/{book.id}"
      body: "*"
    };
  }

  // DeleteBook removes a book and its file. Admin/super_admin only.
  rpc DeleteBook(DeleteBookRequest) returns (DeleteBookResponse) {
    option (google.api.http) = {
      delete: "/api/v1/books/{id}"
    };
  }

  // DownloadBook returns the book's PDF file as binary content.
  rpc DownloadBook(DownloadBookRequest) returns (DownloadBookResponse) {
    option (google.api.http) = {
      get: "/api/v1/books/{id}/download"
    };
  }

  // FavoriteBook adds a book to the user's favorites.
  rpc FavoriteBook(FavoriteBookRequest) returns (FavoriteBookResponse) {
    option (google.api.http) = {
      post: "/api/v1/books/{book_id}/favorite"
      body: "*"
    };
  }

  // UnfavoriteBook removes a book from the user's favorites.
  rpc UnfavoriteBook(UnfavoriteBookRequest) returns (UnfavoriteBookResponse) {
    option (google.api.http) = {
      delete: "/api/v1/books/{book_id}/favorite"
    };
  }

  // GetFavorite checks whether a book is favorited by the current user.
  rpc GetFavorite(GetFavoriteRequest) returns (GetFavoriteResponse) {
    option (google.api.http) = {
      get: "/api/v1/books/{book_id}/favorite"
    };
  }

  // SubmitFeedback submits user feedback for a book.
  rpc SubmitFeedback(SubmitFeedbackRequest) returns (SubmitFeedbackResponse) {
    option (google.api.http) = {
      post: "/api/v1/books/{book_id}/feedback"
      body: "*"
    };
  }

  // GetFeedbackStats returns aggregated feedback statistics for a book.
  rpc GetFeedbackStats(GetFeedbackStatsRequest) returns (GetFeedbackStatsResponse) {
    option (google.api.http) = {
      get: "/api/v1/books/{book_id}/feedback/stats"
    };
  }
}

// Book represents a picturebook resource.
message Book {
  // The unique identifier of the book.
  string id = 1;

  // The title of the book.
  string title = 2;

  // The author of the book.
  string author = 3;

  // A brief description of the book.
  string description = 4;

  // Number of pages (for print edition).
  int32 page_count = 5;

  // Duration in minutes (for audio/animation editions).
  int32 duration_minutes = 6;

  // The core adaptation goal of the book.
  string core_goal = 7;

  // The cognitive adaptation level: light/moderate/severe (轻度/中度/重度).
  string cognitive_level = 8;

  // Primary resource type: print/digital/audio/video.
  string resource_type = 9;

  // Whether print edition is available.
  bool has_print = 10;

  // Whether digital edition is available.
  bool has_digital = 11;

  // Whether audio edition is available.
  bool has_audio = 12;

  // Whether video/animation edition is available.
  bool has_video = 13;

  // Teaching usage suggestions.
  string teaching_suggestion = 14;

  // Parent-child co-reading guide.
  string parent_reading_guide = 15;

  // Minimum recommended age in months.
  int32 recommended_age_min = 16;

  // Maximum recommended age in months.
  int32 recommended_age_max = 17;

  // URL to the book's cover image.
  string cover_image_url = 18;

  // Status: draft/pending/approved/rejected.
  string status = 19;

  // The ID of the user who uploaded/created this book.
  string uploader_id = 20;

  // View count.
  int32 view_count = 21;

  // Associated dimensions (loaded with eager).
  repeated Dimension dimensions = 22;

  // When the book was created.
  google.protobuf.Timestamp create_time = 23;

  // When the book was last updated.
  google.protobuf.Timestamp update_time = 24;
}

// ListBooksRequest is the request for ListBooks.
message ListBooksRequest {
  // Maximum number of books to return. Default 20.
  int32 page_size = 1 [(buf.validate.field).int32 = {
    gte: 0
    lte: 100
  }];

  // Token for the next page of results.
  string page_token = 2;

  // Filter by dimension slug (optional).
  string dimension_slug = 3;

  // Filter by status (optional): draft/pending/approved/rejected.
  string status = 4;

  // Search query for title/author/description (optional).
  string search_query = 5;

  // Sort field: created_at (default), title, view_count.
  string sort_field = 6;

  // Sort direction: true = DESC, false = ASC.
  bool sort_desc = 7;

  // Minimum age in years for filtering.
  int32 age_min = 8;

  // Maximum age in years for filtering.
  int32 age_max = 9;
}

// ListBooksResponse is the response for ListBooks.
message ListBooksResponse {
  // The list of books.
  repeated Book books = 1;

  // Token for the next page. Empty if no more results.
  string next_page_token = 2;
}

// GetBookRequest is the request for GetBook.
message GetBookRequest {
  // The ID of the book to retrieve.
  string id = 1 [(buf.validate.field).string.min_len = 1];
}

// GetBookResponse is the response for GetBook.
message GetBookResponse {
  // The requested book.
  Book book = 1;
}

// CreateBookRequest is the request for CreateBook.
message CreateBookRequest {
  // The title of the book.
  string title = 1 [
    (buf.validate.field).string = { min_len: 1, max_len: 200 }
  ];

  // The author of the book.
  string author = 2 [
    (buf.validate.field).string = { min_len: 1, max_len: 100 }
  ];

  // A brief description.
  string description = 3 [(buf.validate.field).string.max_len = 4096];

  // Number of pages (for print edition).
  int32 page_count = 4;

  // Duration in minutes (for audio/animation editions).
  int32 duration_minutes = 5;

  // The core adaptation goal (required).
  string core_goal = 6 [(buf.validate.field).string.min_len = 1];

  // Cognitive level: light/moderate/severe.
  string cognitive_level = 7 [(buf.validate.field).string.max_len = 50];

  // Primary resource type.
  string resource_type = 8 [(buf.validate.field).string.max_len = 50];

  // Whether print edition is available.
  bool has_print = 9;

  // Whether digital edition is available.
  bool has_digital = 10;

  // Whether audio edition is available.
  bool has_audio = 11;

  // Whether video edition is available.
  bool has_video = 12;

  // Teaching usage suggestions.
  string teaching_suggestion = 13 [(buf.validate.field).string.max_len = 4096];

  // Parent-child co-reading guide.
  string parent_reading_guide = 14 [(buf.validate.field).string.max_len = 4096];

  // Minimum recommended age in months.
  int32 recommended_age_min = 15;

  // Maximum recommended age in months.
  int32 recommended_age_max = 16;

  // Dimension slugs to associate with (required, at least one).
  repeated string dimension_slugs = 17;
}

// CreateBookResponse is the response for CreateBook.
message CreateBookResponse {
  // The created book.
  Book book = 1;
}

// UpdateBookRequest is the request for UpdateBook.
message UpdateBookRequest {
  // The book with updated fields.
  Book book = 1 [(buf.validate.field).required = true];

  // The fields to update.
  google.protobuf.FieldMask update_mask = 2;
}

// UpdateBookResponse is the response for UpdateBook.
message UpdateBookResponse {
  // The updated book.
  Book book = 1;
}

// DeleteBookRequest is the request for DeleteBook.
message DeleteBookRequest {
  // The ID of the book to delete.
  string id = 1 [(buf.validate.field).string.min_len = 1];
}

// DeleteBookResponse is the response for DeleteBook.
message DeleteBookResponse {}

// DownloadBookRequest is the request for DownloadBook.
message DownloadBookRequest {
  // The ID of the book to download.
  string id = 1 [(buf.validate.field).string.min_len = 1];
}

// DownloadBookResponse is the response for DownloadBook.
message DownloadBookResponse {
  // The HTTP body containing the PDF file.
  google.api.HttpBody http_body = 1;
}

// FavoriteBookRequest is the request for FavoriteBook.
message FavoriteBookRequest {
  // The ID of the book to favorite.
  string book_id = 1 [(buf.validate.field).string.min_len = 1];
}

// FavoriteBookResponse is the response for FavoriteBook.
message FavoriteBookResponse {
  bool favorited = 1;
}

// UnfavoriteBookRequest is the request for UnfavoriteBook.
message UnfavoriteBookRequest {
  // The ID of the book to unfavorite.
  string book_id = 1 [(buf.validate.field).string.min_len = 1];
}

// UnfavoriteBookResponse is the response for UnfavoriteBook.
message UnfavoriteBookResponse {}

// GetFavoriteRequest is the request for GetFavorite.
message GetFavoriteRequest {
  // The ID of the book.
  string book_id = 1 [(buf.validate.field).string.min_len = 1];
}

// GetFavoriteResponse is the response for GetFavorite.
message GetFavoriteResponse {
  bool is_favorited = 1;
}

// SubmitFeedbackRequest is the request for SubmitFeedback.
message SubmitFeedbackRequest {
  // The ID of the book.
  string book_id = 1 [(buf.validate.field).string.min_len = 1];

  // Feedback type: read_start / read_complete / difficulty_rating / use_scenario
  string feedback_type = 2 [
    (buf.validate.field).string = { in: ["read_start", "read_complete", "difficulty_rating", "use_scenario"] }
  ];

  // Difficulty rating (1-5), required when feedback_type is difficulty_rating.
  int32 difficulty_rating = 3;

  // Use scenario text, required when feedback_type is use_scenario.
  string use_scenario = 4 [(buf.validate.field).string.max_len = 200];
}

// SubmitFeedbackResponse is the response for SubmitFeedback.
message SubmitFeedbackResponse {
  BookFeedback feedback = 1;
}

// BookFeedback represents a user's feedback on a book.
message BookFeedback {
  // The unique identifier.
  string id = 1;

  // The book ID.
  string book_id = 2;

  // The user ID.
  string user_id = 3;

  // Feedback type.
  string feedback_type = 4;

  // Difficulty rating (1-5).
  int32 difficulty_rating = 5;

  // Use scenario.
  string use_scenario = 6;

  // When the feedback was created.
  google.protobuf.Timestamp created_at = 7;
}

// GetFeedbackStatsRequest is the request for GetFeedbackStats.
message GetFeedbackStatsRequest {
  // The ID of the book.
  string book_id = 1 [(buf.validate.field).string.min_len = 1];
}

// GetFeedbackStatsResponse is the response for GetFeedbackStats.
message GetFeedbackStatsResponse {
  // Number of users who favorited this book.
  int32 favorite_count = 1;

  // Number of users who marked as read_complete.
  int32 read_complete_count = 2;

  // Average difficulty rating (0 if no ratings).
  double avg_difficulty_rating = 3;
}

