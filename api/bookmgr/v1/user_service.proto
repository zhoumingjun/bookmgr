syntax = "proto3";

package bookmgr.v1;

import "bookmgr/v1/common.proto";
import "bookmgr/v1/book_service.proto";
import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/zhoumingjun/bookmgr/gen/api/bookmgr/v1;bookmgrv1";

// UserService manages user resources.
service UserService {
  // CreateUser creates a new user. Admin/super_admin only.
  // Self-registration is disabled.
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse) {
    option (google.api.http) = {
      post: "/api/v1/users"
      body: "*"
    };
  }

  // ListUsers returns a paginated list of users. Admin/super_admin only.
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse) {
    option (google.api.http) = {
      get: "/api/v1/users"
    };
  }

  // GetUser returns a single user by ID.
  rpc GetUser(GetUserRequest) returns (GetUserResponse) {
    option (google.api.http) = {
      get: "/api/v1/users/{id}"
    };
  }

  // UpdateUser updates an existing user. Admin only.
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse) {
    option (google.api.http) = {
      patch: "/api/v1/users/{user.id}"
      body: "*"
    };
  }

  // DeleteUser removes a user permanently. Admin only.
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse) {
    option (google.api.http) = {
      delete: "/api/v1/users/{id}"
    };
  }

  // ListMyFavorites returns the current user's favorited books.
  rpc ListMyFavorites(ListMyFavoritesRequest) returns (ListMyFavoritesResponse) {
    option (google.api.http) = {
      get: "/api/v1/users/me/favorites"
    };
  }

  // ListMyFeedback returns the current user's feedback history.
  rpc ListMyFeedback(ListMyFeedbackRequest) returns (ListMyFeedbackResponse) {
    option (google.api.http) = {
      get: "/api/v1/users/me/feedback"
    };
  }
}

// User represents a user resource.
message User {
  // The unique identifier of the user.
  string id = 1;

  // The username.
  string username = 2;

  // The email address.
  string email = 3;

  // The role of the user.
  Role role = 4;

  // When the user was created.
  google.protobuf.Timestamp create_time = 5;

  // When the user was last updated.
  google.protobuf.Timestamp update_time = 6;
}

// ListUsersRequest is the request for ListUsers.
message ListUsersRequest {
  // Maximum number of users to return. Default 20.
  int32 page_size = 1 [(buf.validate.field).int32 = {
    gte: 0
    lte: 100
  }];

  // Token for the next page of results.
  string page_token = 2;
}

// ListUsersResponse is the response for ListUsers.
message ListUsersResponse {
  // The list of users.
  repeated User users = 1;

  // Token for the next page. Empty if no more results.
  string next_page_token = 2;
}

// GetUserRequest is the request for GetUser.
message GetUserRequest {
  // The ID of the user to retrieve.
  string id = 1 [(buf.validate.field).string.min_len = 1];
}

// UpdateUserRequest is the request for UpdateUser.
message UpdateUserRequest {
  // The user with updated fields.
  User user = 1 [(buf.validate.field).required = true];

  // The fields to update. Supported: username, email, role, password.
  google.protobuf.FieldMask update_mask = 2;

  // New password (only used when update_mask includes "password").
  string password = 3;
}

// GetUserResponse is the response for GetUser.
message GetUserResponse {
  // The requested user.
  User user = 1;
}

// UpdateUserResponse is the response for UpdateUser.
message UpdateUserResponse {
  // The updated user.
  User user = 1;
}

// DeleteUserRequest is the request for DeleteUser.
message DeleteUserRequest {
  // The ID of the user to delete.
  string id = 1 [(buf.validate.field).string.min_len = 1];
}

// DeleteUserResponse is the response for DeleteUser.
message DeleteUserResponse {}

// CreateUserRequest is the request for CreateUser.
// Self-registration is disabled; only admins can create users.
message CreateUserRequest {
  // The username for the new user.
  string username = 1 [
    (buf.validate.field).string = {
      min_len: 3,
      max_len: 64,
      pattern: "^[a-zA-Z0-9_-]{3,64}$"
    }
  ];

  // The email address.
  string email = 2 [
    (buf.validate.field).string.email = true
  ];

  // The role for the new user (super_admin/admin/teacher/parent).
  Role role = 3 [
    (buf.validate.field).enum = {
      not_in: [0]  // Cannot be ROLE_UNSPECIFIED
    }
  ];

  // Initial password. If empty, a random 12-char password is generated.
  string password = 4;
}

// CreateUserResponse is the response for CreateUser.
message CreateUserResponse {
  // The newly created user (password_hash is not included).
  User user = 1;

  // The initial password (only set if auto-generated).
  // Admin must communicate this to the user.
  string generated_password = 2;
}

// FavoriteBook represents a user's favorite book entry.
message FavoriteBook {
  // The unique identifier.
  string id = 1;

  // The book.
  Book book = 2;

  // When the book was favorited.
  google.protobuf.Timestamp created_at = 3;
}

// ListMyFavoritesRequest is the request for ListMyFavorites.
message ListMyFavoritesRequest {
  // Maximum number of results. Default 20.
  int32 page_size = 1 [(buf.validate.field).int32 = { gte: 0, lte: 100 }];

  // Token for the next page of results.
  string page_token = 2;
}

// ListMyFavoritesResponse is the response for ListMyFavorites.
message ListMyFavoritesResponse {
  repeated FavoriteBook favorites = 1;
  string next_page_token = 2;
}

// ListMyFeedbackRequest is the request for ListMyFeedback.
message ListMyFeedbackRequest {
  // Maximum number of results. Default 20.
  int32 page_size = 1 [(buf.validate.field).int32 = { gte: 0, lte: 100 }];

  // Token for the next page of results.
  string page_token = 2;
}

// ListMyFeedbackResponse is the response for ListMyFeedback.
message ListMyFeedbackResponse {
  repeated BookFeedback feedbacks = 1;
  string next_page_token = 2;
}
