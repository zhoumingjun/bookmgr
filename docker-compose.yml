services:
  postgres:
    image: postgres:16-alpine
    container_name: bookmgr-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: bookmgr
      POSTGRES_PASSWORD: bookmgr
      POSTGRES_DB: bookmgr
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookmgr"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bookmgr-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://bookmgr:bookmgr@postgres:5432/bookmgr?sslmode=disable"
      JWT_SECRET: "change-me-in-production"
      UPLOAD_DIR: "/app/uploads"
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bookmgr-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
  uploads:
